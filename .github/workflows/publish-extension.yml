name: Publish VS Code Extension

on:
  push:
    tags:
      # Trigger for extension releases (v0.x.x-ext format)
      - 'v0.*.*-ext'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required for creating releases

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: true  # Include pubmed-search-mcp submodule

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install dependencies
      working-directory: ./vscode-extension
      run: npm ci

    - name: Guard repository metadata and assistant assets
      run: |
        uv run python scripts/check_no_pip.py
        uv run python scripts/check_version_sync.py
        uv run --with pyyaml python scripts/check_cline_skills.py
        uv run python scripts/check_collaboration_safe_docs.py

    - name: Check generated assistant assets are committed
      working-directory: ./vscode-extension
      run: npm run sync-assets:check

    - name: Compile and test extension
      working-directory: ./vscode-extension
      run: npm test

    - name: Cross-platform Python install smoke
      working-directory: ./vscode-extension
      run: uv run python tests/test_mac_compatibility.py

    - name: Managed uv package install smoke
      working-directory: ./vscode-extension
      run: uv run python tests/test_uv_managed_install_smoke.py

    - name: Package extension
      working-directory: ./vscode-extension
      run: npm run package

    - name: Inspect VSIX contents
      working-directory: ./vscode-extension
      shell: pwsh
      run: ./scripts/check-vsix-contents.ps1

    - name: Publish to VS Code Marketplace
      working-directory: ./vscode-extension
      run: npm run publish -- -p ${{ secrets.VSCE_PAT }}
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: vscode-extension/*.vsix
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
