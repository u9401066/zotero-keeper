name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.12', '3.13']

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python ${{ matrix.python-version }}
      run: uv python install ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: ./mcp-server
      run: |
        uv venv --python ${{ matrix.python-version }}
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      working-directory: ./mcp-server
      run: |
        uv run ruff check src/

    - name: Type check with mypy
      working-directory: ./mcp-server
      run: |
        uv run mypy src/ --ignore-missing-imports \
          --disable-error-code type-arg \
          --disable-error-code attr-defined \
          --disable-error-code no-any-return \
          --disable-error-code no-untyped-def \
          --disable-error-code untyped-decorator \
          --disable-error-code no-untyped-call \
          --disable-error-code var-annotated \
          --disable-error-code assignment \
          --disable-error-code dict-item \
          --disable-error-code union-attr \
          --disable-error-code unused-ignore \
          --disable-error-code redundant-cast

    - name: Run tests
      working-directory: ./mcp-server
      run: |
        uv run pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./mcp-server
    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python
      run: uv python install 3.12

    - name: Guard repository metadata and assistant assets
      working-directory: .
      run: |
        uv run python scripts/check_no_pip.py
        uv run python scripts/check_version_sync.py
        uv run --with pyyaml python scripts/check_cline_skills.py

    - name: Install linters
      run: |
        uv venv
        uv pip install ruff

    - name: Guard collaboration-safe docs
      working-directory: ./mcp-server
      run: |
        uv run python ../scripts/check_collaboration_safe_docs.py

    - name: Check code formatting
      run: |
        uv run ruff check src/

  extension:
    name: VSIX smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-13, macos-14]

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Set up Python 3.12
      run: uv python install 3.12

    - name: Install extension dependencies
      working-directory: ./vscode-extension
      run: npm ci

    - name: Check generated assistant assets are committed
      working-directory: ./vscode-extension
      run: npm run sync-assets:check

    - name: Compile and test extension
      working-directory: ./vscode-extension
      run: npm test

    - name: Cross-platform Python install smoke
      working-directory: ./vscode-extension
      run: uv run python tests/test_mac_compatibility.py

    - name: Managed uv package install smoke
      working-directory: ./vscode-extension
      run: uv run python tests/test_uv_managed_install_smoke.py

    - name: Package VSIX
      working-directory: ./vscode-extension
      run: npm run package

    - name: Inspect VSIX contents
      working-directory: ./vscode-extension
      shell: pwsh
      run: ./scripts/check-vsix-contents.ps1
