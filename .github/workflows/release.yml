name: Release

on:
  push:
    tags:
      # GitHub tag filters use glob syntax, not regex.
      # Extension releases use v*-ext tags and are skipped by the job condition below.
      - 'v*.*.*'

jobs:
  release:
    if: ${{ !endsWith(github.ref_name, '-ext') }}
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      contents: write
      id-token: write  # Required for trusted publishing

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      uses: astral-sh/setup-uv@v5

    - name: Guard repository metadata and assistant assets
      run: |
        uv run python scripts/check_no_pip.py
        uv run python scripts/check_version_sync.py
        uv run --with pyyaml python scripts/check_cline_skills.py
        uv run python scripts/check_collaboration_safe_docs.py

    - name: Install dependencies
      working-directory: ./mcp-server
      run: |
        uv venv --python 3.12
        uv pip install -e ".[dev]"

    - name: Lint with ruff
      working-directory: ./mcp-server
      run: uv run ruff check src/

    - name: Type check with mypy
      working-directory: ./mcp-server
      run: |
        uv run mypy src/ --ignore-missing-imports \
          --disable-error-code type-arg \
          --disable-error-code attr-defined \
          --disable-error-code no-any-return \
          --disable-error-code no-untyped-def \
          --disable-error-code untyped-decorator \
          --disable-error-code no-untyped-call \
          --disable-error-code var-annotated \
          --disable-error-code assignment \
          --disable-error-code dict-item \
          --disable-error-code union-attr \
          --disable-error-code unused-ignore \
          --disable-error-code redundant-cast

    - name: Run tests
      working-directory: ./mcp-server
      run: uv run pytest tests/ -v --tb=short

    - name: Build package
      working-directory: ./mcp-server
      run: |
        uv build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v1
      with:
        files: mcp-server/dist/*
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        packages-dir: mcp-server/dist/
      # Uses trusted publishing - no API token needed!
      # Configure at: https://pypi.org/manage/project/zotero-keeper/settings/publishing/
